spring.application.name=shopNow

# Conexión a MySQL en Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/shopnow?rewriteBatchedStatements=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1251

# Optimización para Carga Masiva (Lotes de 50 para completar 100 en 2 pasos)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=true


# Desactivar logs de SQL individuales para mejorar velocidad
spring.jpa.show-sql=false


server.port= 8081


spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true



# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


springdoc.swagger-ui.path=/doc/swagger-ui.html
spring.web.resources.add-mappings=true

